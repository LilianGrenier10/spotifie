<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOTIFIÉ - Inscription</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Inscription</h2>
            </div>
            <div class="login-body">
                <form id="register-form" class="login-form">
                    <div class="form-group">
                        <label for="display_name">Pseudo</label>
                        <input type="text" id="display_name" name="display_name" required>
                    </div>
                    <div class="form-group email">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email">
                    </div>
                    <div class="form-group password">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
                    </div>
                    <div class="form-group password">
                        <label for="password2">Confirmer le mot de passe</label>
                        <input type="password" id="password2" name="password2" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-login">S'inscrire</button>
                </form>
                <p id="error-msg" style="color:#f87171; margin-top:10px; display:none;"></p>
                <p>Déjà un compte ? <a href="/login.html" class="login-register">Se connecter</a></p>
            </div>
        </div>
    </div>

    <script src="/JS/api.js"></script>
    <script src="/JS/header-loader.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const display_name = document.getElementById('display_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const err = document.getElementById('error-msg');
            err.style.display = 'none';

            if (password !== password2) {
                err.textContent = 'Les mots de passe ne correspondent pas';
                err.style.display = 'block';
                return;
            }
            try {
                await window.API.register(email, password, display_name);
                window.location.href = '/main.html';
            } catch (ex) {
                err.textContent = ex.message || "Erreur lors de l'inscription";
                err.style.display = 'block';
            }
        });
    </script>
</body>
</html>
