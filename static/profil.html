<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOTIFIÉ — Mes playlists</title>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/profil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main>
        <div class="container">
            <div class="profile-header">
                <h1 class="page-title">Mes playlists</h1>
                <div class="profile-actions">
                    <span id="spotify-status" class="spotify-status"></span>
                    <a id="spotify-connect-btn" href="/api/auth/spotify/login" class="btn btn-spotify" style="display:none;">
                        <i class="fa-brands fa-spotify"></i> Connecter Spotify
                    </a>
                    <button id="spotify-disconnect-btn" class="btn btn-spotify-disconnect" style="display:none;">
                        <i class="fa-solid fa-link-slash"></i> Déconnecter Spotify
                    </button>
                    <button id="new-playlist-btn" class="btn-login"><i class="fa-solid fa-plus"></i> Nouvelle playlist</button>
                </div>
            </div>

            <div id="playlists-container" class="playlist-grid"></div>
            <div id="empty-state" class="empty-state" style="display:none;">
                <i class="fa-solid fa-music" style="font-size: 3rem; color: var(--primary); opacity: 0.5;"></i>
                <h3>Aucune playlist pour le moment</h3>
                <p>Crée ta première playlist ou ajoute des morceaux depuis la page Découvrir.</p>
            </div>
        </div>
    </main>

    <!-- Modal création playlist -->
    <div id="create-modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3 id="create-title">Nouvelle playlist</h3>
            <input id="create-name" type="text" class="modal-input" placeholder="Nom de la playlist">
            <input id="create-description" type="text" class="modal-input" placeholder="Description (optionnel)">
            <div class="modal-actions">
                <button id="create-cancel" class="btn btn-secondary">Annuler</button>
                <button id="create-submit" class="btn-login">Créer</button>
            </div>
        </div>
    </div>

    <!-- Audio player partagé -->
    <audio id="audio-player" preload="none"></audio>

    <script src="/JS/api.js"></script>
    <script src="/JS/header-loader.js"></script>
    <script src="/JS/profil.js"></script>
</body>
</html>
