<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOTIFIÉ - Connexion</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Connexion</h2>
            </div>
            <div class="login-body">
                <form id="login-form" class="login-form">
                    <div class="form-group email">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email">
                    </div>
                    <div class="form-group password">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-login">Se connecter</button>
                </form>
                <p id="error-msg" style="color:#f87171; margin-top:10px; display:none;"></p>
                <p>Pas encore de compte ? <a href="/register.html" class="login-register">S'inscrire</a></p>
            </div>
        </div>
    </div>

    <script src="/JS/api.js"></script>
    <script src="/JS/header-loader.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const err = document.getElementById('error-msg');
            err.style.display = 'none';
            try {
                await window.API.login(email, password);
                window.location.href = '/main.html';
            } catch (ex) {
                err.textContent = ex.message || 'Erreur de connexion';
                err.style.display = 'block';
            }
        });
    </script>
</body>
</html>
